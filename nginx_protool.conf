server {
    listen 80;
    server_name _; # Replace with your EC2 Public IP or Domain

    # Frontend - Serve static files from the build directory
    root /home/ubuntu/Protool/frontend/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Backend - Proxy API requests to the Node.js server
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Error handling
    error_page 404 /index.html;
}
