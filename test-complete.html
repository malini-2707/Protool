<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>API Test Page</h1>
    <button onclick="testRegister()">Test Register</button>
    <button onclick="testLogin()">Test Login</button>
    <button onclick="testGetProjects()">Test Get Projects</button>
    <button onclick="testCreateProject()">Test Create Project</button>
    <div id="result"></div>

    <script>
        const resultDiv = document.getElementById('result');
        
        async function testRegister() {
            try {
                const response = await axios.post('http://localhost:5000/api/auth/register', {
                    name: 'Test User',
                    email: 'test@example.com',
                    password: 'password123'
                });
                resultDiv.innerHTML = '<pre>' + JSON.stringify(response.data, null, 2) + '</pre>';
            } catch (error) {
                resultDiv.innerHTML = '<pre>ERROR: ' + error.message + '</pre>';
            }
        }
        
        async function testLogin() {
            try {
                const response = await axios.post('http://localhost:5000/api/auth/login', {
                    email: 'test@example.com',
                    password: 'password123'
                });
                resultDiv.innerHTML = '<pre>' + JSON.stringify(response.data, null, 2) + '</pre>';
            } catch (error) {
                resultDiv.innerHTML = '<pre>ERROR: ' + error.message + '</pre>';
            }
        }
        
        async function testGetProjects() {
            try {
                const response = await axios.get('http://localhost:5000/api/projects');
                resultDiv.innerHTML = '<pre>' + JSON.stringify(response.data, null, 2) + '</pre>';
            } catch (error) {
                resultDiv.innerHTML = '<pre>ERROR: ' + error.message + '</pre>';
            }
        }
        
        async function testCreateProject() {
            try {
                const response = await axios.post('http://localhost:5000/api/projects', {
                    name: 'New Test Project',
                    description: 'Created from test page',
                    features: ['KANBAN_BOARD', 'BACKLOG']
                });
                resultDiv.innerHTML = '<pre>' + JSON.stringify(response.data, null, 2) + '</pre>';
            } catch (error) {
                resultDiv.innerHTML = '<pre>ERROR: ' + error.message + '</pre>';
            }
        }
    </script>
</body>
</html>
